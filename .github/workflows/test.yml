---
on:
  push:
    branches:
    - main
    - unit_test
    tags:
    - '*'
  pull_request:
    branches:
    - main
    paths: ['cwas4fmri/*', 'pyproject.toml']


permissions:
  contents: read

jobs:
  check_skip_flags:
    name: Check skip flags
    runs-on: ubuntu-latest
    outputs:
      head-commit-message: ${{ steps.get_head_commit_message.outputs.headCommitMsg }}
    steps:
      - name: Get repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Print head git commit message
        id: get_head_commit_message
        run: echo "headCommitMsg=$(git show -s --format=%s)" >> $GITHUB_OUTPUT

  download-test-data:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
    - name: install tox
      run: pip install tox
    - uses: actions/cache@v5
      id: cache
      env:
        cache-name: smoke_test_halfpipe_ds30
      with:
        path: /home/runner/work/cwas4fmri/cwas4fmri/cwas4fmri/data/test_data
        key: ${{ env.cache-name }}

    - if: ${{ steps.cache.outputs.cache-hit != 'true' }}
      name: Download halfpipe derivative of smoke_test_halfpipe_ds30
      id: download
      run: tox -e test_data

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v5
      with:
        python-version: 3
    - run: pip install --upgrade build twine
    - name: Build sdist and wheel
      run: python -m build
    - run: twine check dist/*
    - name: Upload sdist and wheel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
    - name: Build git archive
      run: mkdir archive && git archive -v -o archive/archive.tgz HEAD
    - name: Upload git archive artifact
      uses: actions/upload-artifact@v4
      with:
        name: archive
        path: archive/

  test-smoke:
    runs-on: ubuntu-latest
    needs: [build, download-test-data, check_skip_flags]
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Restore cached data smoke_test_halfpipe_ds30
      id: cache
      uses: actions/cache/restore@v5
      with:
        path: /home/runner/work/cwas4fmri/cwas4fmri/cwas4fmri/data/test_data
        key: smoke_test_halfpipe_ds30

    - name: Install build dependencies
      run: python -m pip install --upgrade pip

    - name: Install test package
      run: pip install -e .[test]

    - name: Test with pytest
      run: pytest

    - uses: codecov/codecov-action@v4
      if: ${{ always() }}
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
